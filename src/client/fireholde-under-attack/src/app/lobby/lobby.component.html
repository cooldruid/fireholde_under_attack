<div class="lobby">
  <div class="panel">
    <h2 class="panel-title">Players</h2>
    <table class="player-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Player ID</th>
        </tr>
      </thead>
      <tbody>
        @for (player of players(); track player.id; let i = $index) {
          <tr>
            <td>{{ i + 1 }}</td>
            <td class="player-id">{{ player.id }}</td>
          </tr>
        }
      </tbody>
    </table>

    <div class="invite">
      <span class="invite-label">Invite Code</span>
      <span class="invite-code">{{ gameId }}</span>
    </div>

    <button class="start-btn">Start Game</button>
  </div>
</div>
