<div class="board">
  @for (tile of board; track tile.id) {
    <img
      class="tile"
      [style]="tile.id | gridPosition"
      src="assets/tiles/square.png"
      #tile
    />
  }
  <img
    class="player-token"
    src="assets/wizard.png"
    [style.transform]="tokenTransform()"
  />
</div>

<button class="move-button" (click)="movePlayer(5)">Move 5</button>
